<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 인공지능 응용 수업 발표 순서 추첨</title>
<style>
  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  header {
    text-align: center;
    padding: 32px 20px 16px;
    position: relative; z-index: 1;
  }
  header h1 {
    font-size: 2.1rem;
    font-weight: 800;
    background: linear-gradient(135deg, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  header p { color: var(--muted); font-size: 0.93rem; margin-top: 6px; }

  .main-wrap {
    max-width: 1300px;
    margin: 0 auto;
    padding: 10px 20px 40px;
    position: relative; z-index: 1;
  }

  /* 설정 패널 */
  .settings-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  .panel-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .panel-box h3 {
    font-size: 0.82rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .name-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .name-input-wrap { display: flex; flex-direction: column; gap: 4px; }
  .name-label { font-size: 0.7rem; color: var(--muted); text-align: center; }
  .name-input {
    background: #1e293b;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 7px 6px;
    font-size: 0.82rem;
    text-align: center;
    width: 100%;
    transition: border-color 0.2s;
    outline: none;
  }
  .name-input:focus { border-color: var(--accent); }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .result-input {
    background: #1e293b;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 7px 6px;
    font-size: 0.8rem;
    text-align: center;
    width: 100%;
    transition: border-color 0.2s;
    outline: none;
  }
  .result-input:focus { border-color: var(--accent2); }

  /* 버튼 */
  .btn-row {
    display: flex; gap: 12px; justify-content: center;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .btn {
    padding: 12px 26px;
    border: none; border-radius: 10px;
    font-size: 0.97rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #00d4ff, #0066cc);
    color: white;
    box-shadow: 0 0 20px rgba(0,212,255,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0,212,255,0.5); }
  .btn-secondary {
    background: linear-gradient(135deg, #7c3aed, #4c1d95);
    color: white;
    box-shadow: 0 0 20px rgba(124,58,237,0.3);
  }
  .btn-secondary:hover { transform: translateY(-2px); }
  .btn-reset {
    background: #1e293b;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--red); color: var(--red); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* 개별 선택 버튼 */
  .player-select-row {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .player-btn {
    padding: 7px 14px;
    border-radius: 8px;
    background: #1e293b;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .player-btn:hover:not(.done) { border-color: var(--accent); color: var(--accent); }
  .player-btn.done { opacity: 0.4; cursor: not-allowed; }

  /* 게임 영역 */
  .game-area {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    overflow: hidden;
  }
  .player-row {
    display: flex;
    justify-content: space-around;
    margin-bottom: 8px;
  }
  .player-tag {
    width: 88px;
    text-align: center;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 6px 4px;
    border-radius: 8px;
    background: #1e293b;
    border: 1px solid var(--border);
    color: var(--text);
    transition: all 0.3s;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-tag.active {
    background: rgba(0,212,255,0.15);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(0,212,255,0.3);
  }
  .player-tag.done {
    background: rgba(16,185,129,0.1);
    border-color: var(--green);
    color: var(--green);
  }

  #ladderCanvas { display: block; width: 100%; border-radius: 8px; }

  .result-row {
    display: flex;
    justify-content: space-around;
    margin-top: 8px;
  }
  .result-tag {
    width: 88px;
    text-align: center;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 6px 4px;
    border-radius: 8px;
    background: #1e293b;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.3s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result-tag.highlight {
    background: rgba(245,158,11,0.15);
    border-color: var(--yellow);
    color: var(--yellow);
    box-shadow: 0 0 12px rgba(245,158,11,0.3);
    animation: tagPulse 0.9s ease-in-out infinite alternate;
  }
  @keyframes tagPulse {
    from { box-shadow: 0 0 6px rgba(245,158,11,0.2); }
    to   { box-shadow: 0 0 18px rgba(245,158,11,0.6); }
  }

  /* 상태 메시지 */
  .status-msg {
    text-align: center;
    font-size: 0.9rem;
    color: var(--muted);
    margin-top: 10px;
    min-height: 22px;
  }
  .progress-wrap {
    margin-top: 10px;
    background: #1e293b;
    border-radius: 4px;
    height: 4px;
    overflow: hidden;
    display: none;
  }
  .progress-wrap.show { display: block; }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #00d4ff, #7c3aed);
    width: 0%;
    transition: width 0.15s linear;
    border-radius: 4px;
  }

  /* 결과표 */
  .results-table-wrap {
    margin-top: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    display: none;
  }
  .results-table-wrap.show { display: block; }
  .results-table-wrap h3 {
    font-size: 1rem; color: var(--accent);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .results-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .result-card {
    background: #1e293b;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 10px;
    text-align: center;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s ease;
  }
  .result-card.revealed {
    opacity: 1;
    transform: translateY(0);
    border-color: var(--green);
    background: rgba(16,185,129,0.07);
  }
  .result-card .rc-order {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--muted);
    line-height: 1;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .result-card .rc-name {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .result-card .rc-slot {
    font-size: 0.78rem;
    color: var(--green);
    font-weight: 600;
  }

  @media (max-width: 768px) {
    .settings-panel { grid-template-columns: 1fr; }
    .results-grid { grid-template-columns: repeat(2, 1fr); }
    header h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>

<header>
  <h1>🎓 인공지능 응용 수업 발표 순서 추첨</h1>
  <p>사다리 게임으로 발표 순서를 공정하게 결정하세요! · 10인 참가</p>
</header>

<div class="main-wrap">
  <div class="settings-panel">
    <div class="panel-box">
      <h3>👤 발표자 이름 설정</h3>
      <div class="name-grid" id="nameGrid"></div>
    </div>
    <div class="panel-box">
      <h3>📋 발표 순서 슬롯 설정</h3>
      <div class="result-grid" id="resultGrid"></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btnAllRun">⚡ 전체 실행</button>
    <button class="btn btn-secondary" id="btnOneRun">▶ 한 명씩 보기</button>
    <button class="btn btn-reset" id="btnReset">🔄 초기화</button>
  </div>

  <div class="player-select-row" id="playerSelectRow"></div>

  <div class="game-area">
    <div class="player-row" id="playerRow"></div>
    <canvas id="ladderCanvas"></canvas>
    <div class="result-row" id="resultRow"></div>
  </div>

  <div class="status-msg" id="statusMsg">⬆ 전체 실행 또는 한 명씩 보기를 선택하세요</div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="results-table-wrap" id="resultTableWrap">
    <h3>🏆 발표 순서 최종 결과</h3>
    <div class="results-grid" id="resultsGrid"></div>
  </div>
</div>

<script>
const NUM = 10;
const ROWS = 22; // 사다리 가로선이 있을 수 있는 행 수
const FRAMES_PER_SEG = 7; // 각 경로 구간당 프레임 수

const defaultPlayers = ['김민준','이서연','박지호','최수아','정도윤','강예은','조현우','윤채원','임태양','한지수'];
const defaultResults  = ['1번 발표','2번 발표','3번 발표','4번 발표','5번 발표',
                         '6번 발표','7번 발표','8번 발표','9번 발표','10번 발표'];

let players  = [...defaultPlayers];
let results  = [...defaultResults];
let mapping  = [];   // mapping[playerIdx] = 결과열 인덱스
let ladderLines = []; // ladderLines[row] = [c, ...] 가로선 시작 열 목록
let revealed = new Array(NUM).fill(false);
let isRunning = false;
let seqIdx = 0;

const canvas = document.getElementById('ladderCanvas');
const ctx    = canvas.getContext('2d');
const PLAYER_COLORS = [
  '#00d4ff','#7c3aed','#10b981','#f59e0b','#ef4444',
  '#ec4899','#06b6d4','#84cc16','#f97316','#a78bfa'
];
const CANVAS_H = 340;

/* ─── 컬럼 사용 횟수를 고려한 가중치 랜덤 선택 ─── */
function weightedPickCol(colCount, used) {
  // 사용 가능한 컬럼 목록 (인접 제약 포함)
  const available = [];
  for (let c = 0; c < NUM - 1; c++) {
    if (!used.has(c) && !used.has(c - 1) && !used.has(c + 1)) {
      available.push(c);
    }
  }
  if (available.length === 0) return -1;

  // 사용 횟수가 적은 컬럼에 높은 가중치 부여
  const maxCnt = Math.max(...available.map(c => colCount[c])) + 1;
  const weights = available.map(c => (maxCnt - colCount[c]) ** 2); // 제곱으로 차이 강조
  const total = weights.reduce((s, w) => s + w, 0);
  let r = Math.random() * total;
  for (let i = 0; i < available.length; i++) {
    r -= weights[i];
    if (r <= 0) return available[i];
  }
  return available[available.length - 1];
}

/* ─── 사다리 생성 ─── */
function generateLadder() {
  ladderLines = [];
  // 각 컬럼 위치(0~NUM-2)가 몇 번 사용됐는지 추적 → 균등 분배
  const colCount = new Array(NUM - 1).fill(0);

  for (let row = 0; row < ROWS; row++) {
    const used = new Set();
    const cols = [];
    const maxBars = 5 + Math.floor(Math.random() * 3); // 행당 5~7개
    let tries = 0;
    while (cols.length < maxBars && tries < 100) {
      const c = weightedPickCol(colCount, used);
      if (c !== -1) {
        cols.push(c);
        used.add(c);
        colCount[c]++;
      } else {
        break; // 더 이상 놓을 자리 없음
      }
      tries++;
    }
    ladderLines.push(cols.sort((a, b) => a - b));
  }

  // 매핑 계산: 각 플레이어가 내려가면서 어떤 열(결과)에 도달하는지
  // playerCol[i] = 플레이어 i의 현재 열 위치
  const playerCol = Array.from({length: NUM}, (_, i) => i);
  for (let row = 0; row < ROWS; row++) {
    for (const c of ladderLines[row]) {
      // 열 c와 c+1에 있는 플레이어를 찾아서 교환
      let pA = -1, pB = -1;
      for (let i = 0; i < NUM; i++) {
        if (playerCol[i] === c)     pA = i;
        if (playerCol[i] === c + 1) pB = i;
      }
      if (pA !== -1 && pB !== -1) {
        playerCol[pA] = c + 1;
        playerCol[pB] = c;
      }
    }
  }
  mapping = playerCol; // mapping[i] = 최종 도착 열(= 결과 인덱스)
  revealed = new Array(NUM).fill(false);
}

/* ─── 경로 계산: 수직·수평 꺾임 포함 정확한 웨이포인트 반환 ─── */
function getPath(playerIdx) {
  let col = playerIdx;
  // 시작점
  const path = [{ col, row: 0 }];

  for (let row = 0; row < ROWS; row++) {
    // 이 행에서 수평 이동 여부 확인
    let newCol = col;
    for (const c of ladderLines[row]) {
      if (col === c)     { newCol = c + 1; break; }
      if (col === c + 1) { newCol = c;     break; }
    }

    if (newCol !== col) {
      // 수평 이동: 현재 위치(col, row)가 경로에 없으면 추가
      const last = path[path.length - 1];
      if (last.col !== col || last.row !== row) {
        path.push({ col, row });
      }
      // 수평 이동 끝점 추가
      path.push({ col: newCol, row });
      col = newCol;
    }

    // 다음 행으로 수직 이동 (마지막 행이면 제외)
    if (row < ROWS - 1) {
      path.push({ col, row: row + 1 });
    }
  }

  // 최종 도착점 보장
  const last = path[path.length - 1];
  if (last.row !== ROWS - 1) {
    path.push({ col, row: ROWS - 1 });
  }
  return path;
}

/* ─── 캔버스 좌표 변환 ─── */
function colToX(col) {
  const PAD = 44;
  return PAD + (col / (NUM - 1)) * (canvas.width - PAD * 2);
}
function rowToY(row) {
  const PAD = 12;
  return PAD + (row / (ROWS - 1)) * (CANVAS_H - PAD * 2);
}

/* ─── 사다리 기본 그리기 ─── */
function drawLadder() {
  canvas.width  = canvas.offsetWidth || 1100;
  canvas.height = CANVAS_H;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 세로선
  for (let i = 0; i < NUM; i++) {
    const x = colToX(i);
    ctx.beginPath();
    ctx.moveTo(x, rowToY(0));
    ctx.lineTo(x, rowToY(ROWS - 1));
    ctx.strokeStyle = 'rgba(100,116,139,0.35)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // 가로선
  for (let row = 0; row < ROWS; row++) {
    for (const c of ladderLines[row]) {
      const y  = rowToY(row);
      const x1 = colToX(c);
      const x2 = colToX(c + 1);
      ctx.beginPath();
      ctx.moveTo(x1, y);
      ctx.lineTo(x2, y);
      ctx.strokeStyle = 'rgba(124,58,237,0.55)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }
}

/* ─── 완료된 경로 다시 그리기 ─── */
function redrawRevealedPaths(skipPlayer = -1) {
  for (let i = 0; i < NUM; i++) {
    if (revealed[i] && i !== skipPlayer) {
      const p = getPath(i);
      drawSegments(p, PLAYER_COLORS[i % PLAYER_COLORS.length], 0.55);
    }
  }
}

/* ─── 경로 선분 그리기 (웨이포인트 배열 기반) ─── */
function drawSegments(path, color, alpha = 1) {
  if (path.length < 2) return;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth   = 3.5;
  ctx.shadowColor = color;
  ctx.shadowBlur  = 10;
  ctx.globalAlpha = alpha;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.beginPath();
  ctx.moveTo(colToX(path[0].col), rowToY(path[0].row));
  for (let k = 1; k < path.length; k++) {
    ctx.lineTo(colToX(path[k].col), rowToY(path[k].row));
  }
  ctx.stroke();
  // 끝점 원
  const last = path[path.length - 1];
  ctx.beginPath();
  ctx.arc(colToX(last.col), rowToY(last.row), 5.5, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.shadowBlur = 18;
  ctx.fill();
  ctx.restore();
}

/* ─── 경로 애니메이션 ─── */
function animatePath(playerIdx, onDone) {
  const path  = getPath(playerIdx);
  const color = PLAYER_COLORS[playerIdx % PLAYER_COLORS.length];
  const totalSegments = path.length - 1;
  const totalFrames   = totalSegments * FRAMES_PER_SEG;
  let frame = 0;

  function tick() {
    const t          = frame / totalFrames;              // 0 ~ 1
    const segFloat   = t * totalSegments;
    const segIdx     = Math.min(Math.floor(segFloat), totalSegments - 1);
    const segFrac    = segFloat - segIdx;

    // 배경 재구성
    drawLadder();
    redrawRevealedPaths(playerIdx);

    // 현재까지 완성된 경로 세그먼트
    const drawnPath = path.slice(0, segIdx + 1);
    // 현재 진행 중인 구간의 중간점 추가
    if (segIdx < totalSegments) {
      const p0 = path[segIdx];
      const p1 = path[segIdx + 1];
      drawnPath.push({
        col: p0.col + (p1.col - p0.col) * segFrac,
        row: p0.row + (p1.row - p0.row) * segFrac
      });
    }
    drawSegments(drawnPath, color);

    frame++;
    if (frame <= totalFrames) {
      requestAnimationFrame(tick);
    } else {
      // 완성
      drawLadder();
      redrawRevealedPaths(playerIdx);
      drawSegments(path, color);
      if (onDone) onDone();
    }
  }
  requestAnimationFrame(tick);
}

/* ─── UI 빌드 ─── */
function buildUI() {
  // 이름 입력
  const ng = document.getElementById('nameGrid');
  ng.innerHTML = '';
  for (let i = 0; i < NUM; i++) {
    const w = document.createElement('div');
    w.className = 'name-input-wrap';
    w.innerHTML = `<span class="name-label">발표자 ${i + 1}</span>
      <input class="name-input" id="ni${i}" value="${players[i]}" maxlength="6" placeholder="이름">`;
    ng.appendChild(w);
  }

  // 결과 입력
  const rg = document.getElementById('resultGrid');
  rg.innerHTML = '';
  for (let i = 0; i < NUM; i++) {
    const inp = document.createElement('input');
    inp.className = 'result-input';
    inp.id        = `ri${i}`;
    inp.value     = results[i];
    inp.maxLength = 10;
    inp.placeholder = `${i + 1}번 발표`;
    rg.appendChild(inp);
  }

  // 플레이어 태그 (상단)
  const pr = document.getElementById('playerRow');
  pr.innerHTML = '';
  for (let i = 0; i < NUM; i++) {
    const t = document.createElement('div');
    t.className = 'player-tag';
    t.id = `ptag${i}`;
    t.textContent = players[i];
    t.title = `${players[i]} 개별 실행`;
    t.onclick = () => runOne(i);
    pr.appendChild(t);
  }

  // 결과 태그 (하단)
  const rr = document.getElementById('resultRow');
  rr.innerHTML = '';
  for (let i = 0; i < NUM; i++) {
    const t = document.createElement('div');
    t.className = 'result-tag';
    t.id = `rtag${i}`;
    t.textContent = results[i];
    rr.appendChild(t);
  }

  // 개별 선택 버튼
  const psr = document.getElementById('playerSelectRow');
  psr.innerHTML = '';
  for (let i = 0; i < NUM; i++) {
    const b = document.createElement('button');
    b.className = 'player-btn';
    b.id = `pbtn${i}`;
    b.textContent = players[i];
    b.onclick = () => runOne(i);
    psr.appendChild(b);
  }
}

function readInputs() {
  for (let i = 0; i < NUM; i++) {
    const ni = document.getElementById(`ni${i}`);
    const ri = document.getElementById(`ri${i}`);
    if (ni) players[i] = ni.value.trim() || `발표자${i + 1}`;
    if (ri) results[i] = ri.value.trim() || `${i + 1}번 발표`;
  }
}

function updatePlayerTags() {
  for (let i = 0; i < NUM; i++) {
    const t = document.getElementById(`ptag${i}`);
    if (t) t.textContent = players[i];
    const b = document.getElementById(`pbtn${i}`);
    if (b) b.textContent = players[i];
  }
}
function updateResultTags() {
  for (let i = 0; i < NUM; i++) {
    const t = document.getElementById(`rtag${i}`);
    if (t) t.textContent = results[i];
  }
}

/* ─── 결과 카드 ─── */
function buildResultCards() {
  const rg = document.getElementById('resultsGrid');
  rg.innerHTML = '';
  for (let i = 0; i < NUM; i++) {
    const c = document.createElement('div');
    c.className = 'result-card';
    c.id = `rcard${i}`;
    c.innerHTML = `<div class="rc-order">?</div>
      <div class="rc-name">???</div>
      <div class="rc-slot">???</div>`;
    rg.appendChild(c);
  }
  document.getElementById('resultTableWrap').classList.add('show');
}

function revealCard(playerIdx) {
  const resultIdx = mapping[playerIdx];
  const card = document.getElementById(`rcard${playerIdx}`);
  if (!card) return;
  // 발표 순서 번호 파싱 (예: "3번 발표" → "3")
  card.querySelector('.rc-order').textContent = `발표자 ${playerIdx + 1}`;
  card.querySelector('.rc-name').textContent  = players[playerIdx];
  card.querySelector('.rc-slot').textContent  = results[resultIdx];
  setTimeout(() => card.classList.add('revealed'), 80);
}

/* ─── 한 명 실행 (클릭 또는 개별) ─── */
function runOne(playerIdx) {
  if (isRunning || revealed[playerIdx]) return;
  readInputs();
  updatePlayerTags();
  updateResultTags();
  _doRun(playerIdx, null);
}

function _doRun(playerIdx, onDone) {
  isRunning = true;
  document.getElementById(`ptag${playerIdx}`).classList.add('active');
  document.getElementById(`pbtn${playerIdx}`).classList.add('done');
  document.getElementById('statusMsg').textContent =
    `🔍 ${players[playerIdx]}의 발표 순서를 추첨하는 중...`;

  animatePath(playerIdx, () => {
    revealed[playerIdx] = true;
    const ri = mapping[playerIdx];
    document.getElementById(`ptag${playerIdx}`).classList.remove('active');
    document.getElementById(`ptag${playerIdx}`).classList.add('done');
    document.getElementById(`rtag${ri}`).classList.add('highlight');
    document.getElementById('statusMsg').textContent =
      `✅ ${players[playerIdx]} → ${results[ri]}`;
    revealCard(playerIdx);
    isRunning = false;

    if (revealed.every(r => r)) {
      document.getElementById('statusMsg').textContent =
        '🎉 모든 발표자의 순서가 결정되었습니다!';
    }
    if (onDone) onDone();
  });
}

/* ─── 전체 실행 ─── */
async function runAll() {
  if (isRunning) return;
  readInputs();
  resetState();
  buildResultCards();

  const prog = document.getElementById('progressWrap');
  const bar  = document.getElementById('progressBar');
  prog.classList.add('show');

  for (let i = 0; i < NUM; i++) {
    bar.style.width = `${(i / NUM) * 100}%`;
    await new Promise(resolve => _doRun(i, resolve));
    await new Promise(r => setTimeout(r, 150));
  }
  bar.style.width = '100%';
  setTimeout(() => prog.classList.remove('show'), 700);
}

/* ─── 한 명씩 순서대로 ─── */
function runNextOne() {
  if (isRunning) return;
  readInputs();

  if (seqIdx === 0) {
    resetState();
    buildResultCards();
    drawLadder();
  }
  if (seqIdx >= NUM) {
    seqIdx = 0;
    document.getElementById('statusMsg').textContent =
      '🔄 모두 완료! 초기화 후 다시 시작하세요.';
    return;
  }
  _doRun(seqIdx, null);
  seqIdx++;
}

/* ─── 상태 초기화 (사다리 유지) ─── */
function resetState() {
  revealed = new Array(NUM).fill(false);
  for (let i = 0; i < NUM; i++) {
    const pt = document.getElementById(`ptag${i}`);
    if (pt) pt.className = 'player-tag';
    const pb = document.getElementById(`pbtn${i}`);
    if (pb) pb.className = 'player-btn';
    const rt = document.getElementById(`rtag${i}`);
    if (rt) { rt.className = 'result-tag'; rt.textContent = results[i]; }
  }
  updatePlayerTags();
  updateResultTags();
  document.getElementById('resultTableWrap').classList.remove('show');
  document.getElementById('resultsGrid').innerHTML = '';
  document.getElementById('progressWrap').classList.remove('show');
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('statusMsg').textContent =
    '⬆ 전체 실행 또는 한 명씩 보기를 선택하세요';
  drawLadder();
}

/* ─── 전체 초기화 (사다리 재생성) ─── */
function fullReset() {
  seqIdx = 0;
  isRunning = false;
  readInputs();
  generateLadder();
  buildUI();
  resetState();
}

/* ─── 이벤트 ─── */
document.getElementById('btnAllRun').onclick  = runAll;
document.getElementById('btnOneRun').onclick  = runNextOne;
document.getElementById('btnReset').onclick   = fullReset;

document.addEventListener('input', e => {
  if (e.target.classList.contains('name-input')) {
    const i = parseInt(e.target.id.replace('ni', ''));
    players[i] = e.target.value.trim() || `발표자${i + 1}`;
    const t = document.getElementById(`ptag${i}`);
    if (t) t.textContent = players[i];
    const b = document.getElementById(`pbtn${i}`);
    if (b) b.textContent = players[i];
  }
  if (e.target.classList.contains('result-input')) {
    const i = parseInt(e.target.id.replace('ri', ''));
    results[i] = e.target.value.trim() || `${i + 1}번 발표`;
    const t = document.getElementById(`rtag${i}`);
    if (t) t.textContent = results[i];
  }
});

window.addEventListener('resize', () => {
  drawLadder();
  redrawRevealedPaths();
});

/* ─── 초기 실행 ─── */
generateLadder();
buildUI();
drawLadder();
buildResultCards();
</script>
</body>
</html>
